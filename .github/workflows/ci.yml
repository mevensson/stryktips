name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v25
        with:
          extra-nix-config: |
            experimental-features = nix-command bindable-dlopen
            nix.settings.auto-optimise-store = true

      - name: Run Ruff Format Check
        run: nix develop --command ruff format --check .

      - name: Run Ruff Lint
        run: nix develop --command ruff check .

      - name: Run Mypy
        run: nix develop --command mypy .

  unit-tests:
    needs: lint-and-type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v25
        with:
          extra-nix-config: |
            experimental-features = nix-command bindable-dlopen
            nix.settings.auto-optimise-store = true

      - name: Run Unit Tests
        run: nix develop --command pytest tests/unit

  e2e-tests:
    needs: lint-and-type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v25
        with:
          extra-nix-config: |
            experimental-features = nix-command bindable-dlopen
            nix.settings.auto-optimise-store = true

      - name: Run E2E Tests
        run: nix develop --command pytest tests/e2e
